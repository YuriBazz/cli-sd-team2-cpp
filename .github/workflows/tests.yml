name: Test
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            g++ \
            make \
            clang-format \
            cppcheck \
            flex \
            bison
      - name: Check code formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | xargs clang-format -style=file --dry-run --Werror
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_CXX_FLAGS="-Wall -Wextra -Werror"
      - name: Build
        run: |
          cd build
          make -j$(nproc)
      - name: Static analysis with cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
                  --suppress=missingIncludeSystem \
                  --suppress=unusedFunction \
                  --suppress=useStlAlgorithm \
                  --error-exitcode=1 \
                  --std=c++17 \
                  -I src/ \
                  src/
      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --rerun-failed
